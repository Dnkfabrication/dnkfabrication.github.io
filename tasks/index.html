<body>

<!-- ===================== CONFIG ===================== -->
<!-- API_URL is the GAS /exec URL (not secret on its own - data needs the token).
     The TOKEN is NOT shipped in this page. It is entered once on the phone and
     stored in localStorage only, so this public page carries no secret. -->
<script>
  var CONFIG = {
    API_URL: "https://script.google.com/macros/s/AKfycbzokTkC93s1-DjZzFoN4jGdJhwFFgj7YKQRglrt5KMe2g1863CnTRMCj2fLPn1hcc4k/exec"    // GAS /exec URL (deployed 2026-06-15)
  };
  // token lives only on this device after first entry
  function getToken(){ return localStorage.getItem("dnk_token") || ""; }
  function setToken(v){ localStorage.setItem("dnk_token", v); }
  function clearToken(){ localStorage.removeItem("dnk_token"); }
</script>

<header>
  <div class="ttl"><h1>DNK TASKS</h1><span class="tag">Ideas Forged in Steel</span></div>
  <div class="statusbar">
    <span id="updated">loading...</span>
    <button class="refresh" onclick="load(true)">Refresh</button>
  </div>
</header>
<div class="stale" id="stale">Offline - showing last saved list</div>

<div class="wrap" id="main"></div>

<div class="compbar" id="compbar"><a href="#" onclick="showCompleted();return false;">View completed tasks</a></div>

<button class="fab" onclick="openAdd()">+</button>

<!-- Add-task modal -->
<div class="modal" id="addModal">
  <div class="sheet">
    <h2>New task</h2>
    <label>Title</label>
    <input type="text" id="aTitle" placeholder="What needs doing?">
    <label>Detail (optional)</label>
    <textarea id="aDetail" rows="3" placeholder="Notes, who, context..."></textarea>
    <label>Due date (optional)</label>
    <input type="date" id="aDue">
    <button class="save" onclick="submitAdd()">Add task</button>
    <button class="cancel" onclick="closeAdd()">Cancel</button>
  </div>
</div>

<!-- Passcode gate (shown only if no token stored on this device) -->
<div class="modal" id="gateModal">
  <div class="sheet">
    <h2>DNK Tasks — enter passcode</h2>
    <p style="color:#8a96a0;font-size:13px;margin:0 0 8px">One time on this device. Get the code from Dylan/Art.</p>
    <input type="password" id="gateInput" placeholder="passcode" autocomplete="off"
           onkeydown="if(event.key==='Enter')submitGate()">
    <div id="gateErr" style="color:#f0a0ad;font-size:13px;margin-top:8px;display:none">Wrong code — try again.</div>
    <button class="save" onclick="submitGate()">Unlock</button>
  </div>
</div>

<script>
/* ---------------- state ---------------- */
var CACHE_KEY = "dnk_tasks_cache_v1";
var tasks = [];
var today = "";
var openId = null;          // which drawer is open

var CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

var SECTIONS = [
  {bucket:"lead",     label:"🆕 NEW LEADS",  collapsed:false},
  {bucket:"triage",   label:"⚡ TRIAGE",           collapsed:false},
  {bucket:"overdue",  label:"🔴 OVERDUE",     collapsed:false},
  {bucket:"today",    label:"📅 TODAY",       collapsed:false},
  {bucket:"upcoming", label:"UPCOMING",                collapsed:false},
  {bucket:"someday",  label:"SOMEDAY",                 collapsed:true}
];

/* ---------------- networking ---------------- */
function api(method, body) {
  var tok = getToken();
  var url = CONFIG.API_URL;
  var opts = {method: method};
  if (method === "GET") {
    url += (url.indexOf("?") < 0 ? "?" : "&") + "key=" + encodeURIComponent(tok);
    if (body && body.view) { url += "&view=" + encodeURIComponent(body.view); }
  } else {
    body = body || {};
    body.key = tok;
    // text/plain avoids a CORS preflight against Apps Script.
    opts.headers = {"Content-Type": "text/plain;charset=utf-8"};
    opts.body = JSON.stringify(body);
  }
  return fetch(url, opts).then(function (r) { return r.json(); });
}

function load(manual) {
  api("GET").then(function (res) {
    if (res && res.tasks) {
      tasks = res.tasks;
      today = res.today || isoToday();
      localStorage.setItem(CACHE_KEY, JSON.stringify({tasks: tasks, today: today, at: Date.now()}));
      document.getElementById("stale").style.display = "none";
      stamp();
      render();
    } else if (res && res.error === "unauthorized") {
      clearToken(); openGate();
    } else if (res && res.error) {
      stamp("error: " + res.error);
    }
  }).catch(function () {
    loadCache(true);
  });
}

/* ---------------- passcode gate ---------------- */
function openGate(){
  document.getElementById("gateModal").classList.add("show");
  setTimeout(function(){ var i=document.getElementById("gateInput"); if(i) i.focus(); }, 100);
}
function submitGate(){
  var v = (document.getElementById("gateInput").value || "").trim();
  if(!v) return;
  setToken(v);
  // validate with a real fetch; wrong code -> backend says unauthorized
  api("GET", {view:"data"}).then(function(res){
    if(res && res.tasks){
      document.getElementById("gateModal").classList.remove("show");
      document.getElementById("gateInput").value = "";
      document.getElementById("gateErr").style.display = "none";
      tasks = res.tasks; today = res.today || isoToday();
      localStorage.setItem(CACHE_KEY, JSON.stringify({tasks:tasks,today:today,at:Date.now()}));
      stamp(); render();
    } else {
      clearToken();
      document.getElementById("gateErr").style.display = "block";
    }
  }).catch(function(){
    document.getElementById("gateErr").textContent = "Can't reach the list — check connection.";
    document.getElementById("gateErr").style.display = "block";
  });
}

function loadCache(stale) {
  var raw = localStorage.getItem(CACHE_KEY);
  if (raw) {
    try {
      var c = JSON.parse(raw);
      tasks = c.tasks || [];
      today = c.today || isoToday();
      render();
      if (stale) {
        document.getElementById("stale").style.display = "block";
        stamp("cached");
      }
    } catch (e) {}
  } else if (stale) {
    document.getElementById("main").innerHTML =
      '<div class="empty-all">Can\'t reach the task list and nothing cached yet.</div>';
  }
}

function stamp(extra) {
  var d = new Date();
  var hh = ("0" + d.getHours()).slice(-2), mm = ("0" + d.getMinutes()).slice(-2);
  document.getElementById("updated").textContent =
    "updated " + hh + ":" + mm + (extra ? " (" + extra + ")" : "");
}

function isoToday() {
  var d = new Date();
  return d.getFullYear() + "-" + ("0"+(d.getMonth()+1)).slice(-2) + "-" + ("0"+d.getDate()).slice(-2);
}

/* ---------------- sorting (mirrors backend sort_key) ---------------- */
function reclassifyAndSort() {
  // After a local edit we recompute buckets so the UI stays consistent
  // without a round-trip. Mirrors classify_() in Code.gs.
  tasks.forEach(function (t) {
    var due = (t.due_date || "").substring(0, 10);
    var hasDue = !!due;
    var hasPrio = (t.priority !== "" && t.priority !== null && t.priority !== undefined);
    var src = String(t.source || "manual").toLowerCase();
    var sec = String(t.section || "").toLowerCase();
    var b;
    if (src === "lead" && sec !== "triaged") b = "lead";
    else if (sec === "triage" || (!hasDue && !hasPrio && src === "manual")) b = "triage";
    else if (hasDue && due < today) b = "overdue";
    else if (hasDue && due === today) b = "today";
    else if (hasDue && due > today) b = "upcoming";
    else b = "someday";
    var group = {lead:0,triage:1,overdue:2,today:3,upcoming:4,someday:5}[b];
    var prio = hasPrio ? String(t.priority) : "5";
    var sub = (b==="overdue"||b==="upcoming"||b==="today")
      ? ((due||"9999-99-99")+"|"+prio) : (prio+"|"+String(t.created||""));
    t.bucket = b;
    t.sort_key = group + "|" + sub + "|" + String(t.id||"");
  });
  tasks.sort(function (a,b){ return a.sort_key < b.sort_key ? -1 : (a.sort_key > b.sort_key ? 1 : 0); });
}

/* ---------------- due chip ---------------- */
function dayDiff(due) {
  var d1 = new Date(today + "T00:00:00");
  var d2 = new Date(due + "T00:00:00");
  return Math.round((d2 - d1) / 86400000);
}
function chipFor(t) {
  var due = (t.due_date || "").substring(0,10);
  if (t.bucket === "lead") return {cls:"lead", txt:"LEAD"};
  if (t.bucket === "triage") return {cls:"", txt:"TRIAGE"};
  if (!due) return null;
  var n = dayDiff(due);
  if (n < 0)  return {cls:"over", txt:(-n)+"d OVERDUE"};
  if (n === 0) return {cls:"today", txt:"TODAY"};
  if (n === 1) return {cls:"soon", txt:"1d"};
  return {cls:"soon", txt:n+"d"};
}

/* ---------------- render ---------------- */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render() {
  var main = document.getElementById("main");
  if (!tasks.length) {
    main.innerHTML = '<div class="empty-all">All clear. Nothing on the list.</div>';
    return;
  }
  var html = "";
  SECTIONS.forEach(function (sec) {
    var items = tasks.filter(function (t){ return t.bucket === sec.bucket; });
    var emptyCls = items.length ? "" : " empty";
    html += '<div class="section' + emptyCls + '">';
    html += '<div class="sechead">' + sec.label + '<span class="cnt">' + items.length + '</span></div>';
    items.forEach(function (t){ html += taskHTML(t); });
    html += '</div>';
  });
  main.innerHTML = html;
}

function taskHTML(t) {
  var chip = chipFor(t);
  var chipHtml = chip ? '<span class="chip ' + chip.cls + '">' + esc(chip.txt) + '</span>' : '';
  var pri = (t.priority !== "" && t.priority != null) ? '<span class="pri">P' + esc(t.priority) + '</span>' : '';
  var openCls = (openId === t.id) ? " open" : "";
  var metaBits = [];
  if (t.source && t.source !== "manual") metaBits.push(esc(t.source));
  var meta = metaBits.length ? '<div class="meta">' + metaBits.join(" · ") + '</div>' : '';

  return '<div class="task' + openCls + '" id="task-' + esc(t.id) + '">'
    + '<div class="row">'
    +   '<div class="ck" onclick="complete(event,\'' + esc(t.id) + '\')">' + CHECK_SVG + '</div>'
    +   '<div class="ttlw" onclick="toggle(\'' + esc(t.id) + '\')">'
    +     '<div class="ttext">' + esc(t.title) + pri + '</div>' + meta
    +   '</div>'
    +   chipHtml
    + '</div>'
    + '<div class="drawer">'
    +   (t.detail ? '<div class="detail">' + esc(t.detail) + '</div>' : '<div class="detail" style="color:#6c7782">(no detail)</div>')
    +   drawerActions(t)
    + '</div>'
    + '</div>';
}

function drawerActions(t) {
  var id = esc(t.id);
  var h = '<div class="actions">';
  if (t.bucket === "lead") {
    h += '<button class="btn make" onclick="makeTask(\'' + id + '\')">Make Task</button>';
    h += '<button class="btn done" onclick="completeId(\'' + id + '\')">Done / Dismiss</button>';
  } else if (t.bucket === "triage") {
    h += '<button class="btn asap" onclick="setAsap(\'' + id + '\')">ASAP</button>';
    h += '<button class="btn date" onclick="toggleDate(\'' + id + '\')">Set date</button>';
    h += '<button class="btn done" onclick="completeId(\'' + id + '\')">Done</button>';
  } else {
    h += '<button class="btn date" onclick="toggleDate(\'' + id + '\')">Reschedule</button>';
    h += '<button class="btn done" onclick="completeId(\'' + id + '\')">Done</button>';
  }
  h += '</div>';
  h += '<div class="dateform" id="df-' + id + '">'
    +  '<input type="date" id="di-' + id + '">'
    +  '<button class="btn ghost" onclick="saveDate(\'' + id + '\')">Save date</button>'
    +  '</div>';
  return h;
}

/* ---------------- interactions ---------------- */
function toggle(id) {
  openId = (openId === id) ? null : id;
  render();
}

function findTask(id){ for (var i=0;i<tasks.length;i++) if (String(tasks[i].id)===String(id)) return tasks[i]; return null; }

function complete(ev, id) { ev.stopPropagation(); completeId(id); }

function completeId(id) {
  var el = document.getElementById("task-" + id);
  if (el) {
    var ck = el.querySelector(".ck"); if (ck) ck.classList.add("checked");
    el.classList.add("leaving");
  }
  // optimistic remove
  setTimeout(function () {
    tasks = tasks.filter(function (t){ return String(t.id) !== String(id); });
    if (openId === id) openId = null;
    render();
  }, 260);
  api("POST", {action:"complete", id:id}).catch(function(){ load(); });
}

function setAsap(id) {
  var t = findTask(id); if (t){ t.priority = 1; t.section = "asap"; }
  reclassifyAndSort(); render();
  api("POST", {action:"update", id:id, fields:{priority:1, section:"asap"}}).catch(function(){ load(); });
}

function toggleDate(id) {
  var df = document.getElementById("df-" + id);
  if (df) df.classList.toggle("show");
}

function saveDate(id) {
  var inp = document.getElementById("di-" + id);
  var val = inp ? inp.value : "";
  if (!val) return;
  var t = findTask(id); if (t){ t.due_date = val; if (t.section==="triage") t.section=""; }
  reclassifyAndSort(); render();
  api("POST", {action:"update", id:id, fields:{due_date:val, section:""}}).catch(function(){ load(); });
}

function makeTask(id) {
  // Promote a lead: mark triaged so it leaves the lead bucket, then let Dylan
  // set a date via the now-visible reschedule controls.
  var t = findTask(id); if (t){ t.section = "triaged"; t.source = "lead"; }
  reclassifyAndSort();
  openId = id;
  render();
  // open the date form for convenience
  setTimeout(function(){ toggleDate(id); }, 50);
  api("POST", {action:"update", id:id, fields:{section:"triaged"}}).catch(function(){ load(); });
}

/* ---------------- add modal ---------------- */
function openAdd(){ document.getElementById("addModal").classList.add("show"); }
function closeAdd(){
  document.getElementById("addModal").classList.remove("show");
  document.getElementById("aTitle").value = "";
  document.getElementById("aDetail").value = "";
  document.getElementById("aDue").value = "";
}
function submitAdd() {
  var title = document.getElementById("aTitle").value.trim();
  if (!title) { document.getElementById("aTitle").focus(); return; }
  var detail = document.getElementById("aDetail").value.trim();
  var due = document.getElementById("aDue").value;
  var body = {action:"add", title:title, detail:detail, source:"manual"};
  if (due) body.due_date = due;
  closeAdd();
  api("POST", body).then(function(){ load(); }).catch(function(){ load(); });
}

/* ---------------- completed view ---------------- */
function showCompleted() {
  var main = document.getElementById("main");
  document.getElementById("compbar").style.display = "none";
  main.innerHTML = '<button class="backbtn" onclick="backToActive()">&larr; Back to tasks</button>'
    + '<div class="empty-all">Loading completed...</div>';
  api("GET", {view:"completed"}).then(function (res) {
    var list = (res && res.completed) || [];
    var html = '<button class="backbtn" onclick="backToActive()">&larr; Back to tasks</button>';
    if (!list.length) { html += '<div class="empty-all">No completed tasks yet.</div>'; }
    else {
      html += '<div class="sechead">✓ COMPLETED<span class="cnt">' + list.length + '</span></div>';
      list.forEach(function (t) {
        var when = (t.completed || "").substring(0,16).replace("T"," ");
        html += '<div class="comprow">' + esc(t.title)
          + '<div class="when">' + esc(when) + '</div></div>';
      });
    }
    main.innerHTML = html;
  }).catch(function () {
    main.innerHTML = '<button class="backbtn" onclick="backToActive()">&larr; Back to tasks</button>'
      + '<div class="empty-all">Could not load completed (offline).</div>';
  });
}
function backToActive() {
  document.getElementById("compbar").style.display = "block";
  render();
}

/* ---------------- lifecycle ---------------- */
document.addEventListener("visibilitychange", function () {
  if (!document.hidden) load();
});
window.addEventListener("focus", function () { load(); });

// First paint from cache (instant), then gate-or-load.
loadCache(false);
if (getToken()) { load(); } else { openGate(); }
</script>
</body>
</html>
